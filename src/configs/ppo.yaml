# Model for PPO finetuning
model_name_or_path: ../data/sft
use_peft: true
lora_alpha: 16
lora_r: 8
lora_dropout: 0.1
output_dir: ../data/ppo/llama3-ppo-test

# Reward model
reward_model: http://hyperturing:8000
discount_reward_factor: 0.99

# Dataset
query_dataset: stair-lab/airbench-ppo-test
ppo_epochs: 100000
mini_batch_size: 2
batch_size: 2

# Hyperparameters
gradient_accumulation_steps: 1
gradient_checkpointing: true
learning_rate: 1.0e-4
save_steps: 50

max_new_tokens: 256